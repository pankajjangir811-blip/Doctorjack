name: Bug report
description: Report a reproducible Doctorjack problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private target URLs, customer data, or scan results containing sensitive information.
  - type: input
    id: version
    attributes:
      label: Doctorjack version
      placeholder: v7.7
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Kali Linux 2026.x / Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Explain what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Use example.com or sanitized data only.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
